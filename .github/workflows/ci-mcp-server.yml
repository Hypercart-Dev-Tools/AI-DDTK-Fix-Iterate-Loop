name: MCP Server CI

on:
  push:
    paths:
      - 'tools/mcp-server/**'
  pull_request:
    paths:
      - 'tools/mcp-server/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: tools/mcp-server
        run: npm ci

      - name: Build
        working-directory: tools/mcp-server
        run: npm run build

      - name: Test
        working-directory: tools/mcp-server
        run: npm test
