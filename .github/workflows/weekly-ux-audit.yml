name: Weekly UX Audit

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 9am UTC
  workflow_dispatch: {}   # Manual trigger

jobs:
  ux-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run UX audit checks
        run: bash tools/ux-audit.sh

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `UX Audit: ${new Date().toISOString().slice(0, 10)} — check(s) failed`;
            const body = [
              '## Weekly UX Audit Failed',
              '',
              'One or more automated checks did not pass.',
              'Run `bash tools/ux-audit.sh` locally to see details.',
              '',
              'See [recipes/weekly-ux-audit.md](recipes/weekly-ux-audit.md) for the full checklist.',
              '',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ux-audit'],
            });
