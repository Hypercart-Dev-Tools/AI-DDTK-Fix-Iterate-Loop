name: Weekly UX Audit

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 9am UTC
  workflow_dispatch: {}   # Manual trigger

jobs:
  ux-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run UX audit checks
        run: bash tools/ux-audit.sh

      - name: Report failure (deduplicated)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'ux-audit';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            // Ensure the label exists (create if missing)
            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch {
              await github.rest.issues.createLabel({
                owner, repo, name: label,
                color: 'e4e669',
                description: 'Weekly UX audit failure',
              });
            }

            // Check for an existing open ux-audit issue
            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo,
              labels: label,
              state: 'open',
              per_page: 1,
            });

            if (existing.length > 0) {
              // Comment on the existing issue instead of creating a duplicate
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: existing[0].number,
                body: `Still failing as of ${new Date().toISOString().slice(0, 10)}.\n\nWorkflow run: ${runUrl}`,
              });
              core.info(`Commented on existing issue #${existing[0].number}`);
            } else {
              // Create a new issue
              const title = `UX Audit: ${new Date().toISOString().slice(0, 10)} — check(s) failed`;
              const body = [
                '## Weekly UX Audit Failed',
                '',
                'One or more automated checks did not pass.',
                'Run `bash tools/ux-audit.sh` locally to see details.',
                '',
                'See [recipes/weekly-ux-audit.md](recipes/weekly-ux-audit.md) for the full checklist.',
                '',
                `Workflow run: ${runUrl}`,
              ].join('\n');
              const { data: issue } = await github.rest.issues.create({
                owner, repo, title, body,
                labels: [label],
              });
              core.info(`Created issue #${issue.number}`);
            }
